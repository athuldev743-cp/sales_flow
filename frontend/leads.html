<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leads — SalesFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080810;--surface:#0f0f1a;--surface2:#141422;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#7c6dfa;--accent2:#e8632a;
  --text:#e8e6f0;--muted:#6b6880;--green:#3ddc97;
  --sidebar:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;padding:1.5rem 1.25rem;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;padding:0 0.5rem;margin-bottom:1.5rem;}
.logo span{color:var(--accent);}
.nav-item{display:flex;align-items:center;gap:10px;padding:0.6rem 0.75rem;border-radius:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);text-decoration:none;margin:1px 0;transition:background .15s;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-item.active{background:rgba(124,109,250,0.1);color:var(--text);}

/* Main */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;}
.topbar{border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;background:rgba(8,8,16,0.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40;}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-right:auto;}

/* Search bar */
.search-wrap{flex:1;max-width:500px;position:relative;}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:0.65rem 1rem 0.65rem 2.5rem;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px;}
.search-input::placeholder{color:var(--muted);}

/* Page body */
.page{display:flex;flex:1;gap:0;}

/* Filters sidebar */
.filters{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;max-height:calc(100vh - 60px);position:sticky;top:60px;}
.filter-group label{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:0.5rem;}
.filter-select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:0.5rem 0.75rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;cursor:pointer;}
.filter-select option{background:var(--surface2);}
.clear-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:6px;padding:0.5rem;font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color .2s,color .2s;margin-top:0.5rem;}
.clear-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Stats bar */
.stats-bar{display:flex;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);}
.stat-pill{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.stat-pill strong{color:var(--text);font-weight:500;}

/* Results */
.results{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.results-content{flex:1;overflow-y:auto;padding:1rem 1.5rem;}

/* Lead cards */
.lead-card{
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface);padding:1rem 1.25rem;
  margin-bottom:0.75rem;cursor:pointer;
  transition:border-color .15s,background .15s;
  display:flex;gap:1rem;align-items:flex-start;
}
.lead-card:hover{border-color:var(--border2);background:rgba(124,109,250,0.03);}
.lead-card.selected{border-color:var(--accent);background:rgba(124,109,250,0.06);}

.lead-check{flex-shrink:0;margin-top:2px;}
.lead-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}

.lead-main{flex:1;min-width:0;}
.lead-company{font-weight:500;font-size:0.95rem;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lead-contact{font-size:0.82rem;color:var(--muted);margin-bottom:4px;}
.lead-business{font-size:0.8rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.lead-meta{flex-shrink:0;text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.lead-location{font-size:0.78rem;color:var(--muted);font-family:'DM Mono',monospace;}
.lead-email{font-size:0.78rem;color:var(--accent);word-break:break-all;}
.lead-mobile{font-size:0.78rem;color:var(--muted);}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:1rem;border-top:1px solid var(--border);}
.page-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);border-radius:6px;padding:0.4rem 0.75rem;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color .15s,color .15s;}
.page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.page-btn.active{background:rgba(124,109,250,0.1);border-color:var(--accent);color:var(--accent);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.page-info{font-size:0.82rem;color:var(--muted);font-family:'DM Mono',monospace;padding:0 0.5rem;}

/* Action bar */
.action-bar{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface2);}
.selected-count{font-size:0.85rem;color:var(--muted);}
.selected-count strong{color:var(--text);}
.action-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:0.5rem 1.25rem;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;}
.action-btn:hover{opacity:0.85;}
.action-btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.action-btn.secondary:hover{border-color:var(--border2);color:var(--text);}

/* Empty / loading */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty h3{font-size:1rem;color:var(--text);margin-bottom:0.5rem;}
.empty p{font-size:0.88rem;line-height:1.6;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Highlight match */
mark{background:rgba(124,109,250,0.2);color:var(--accent);border-radius:2px;padding:0 2px;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Sales<span>Flow</span></div>
  <a class="nav-item" href="/dashboard.html">⬛ Dashboard</a>
  <a class="nav-item" href="/leads.html">◉ Leads</a>
  <a class="nav-item" href="/campaigns.html">✉ Campaigns</a>
  <a class="nav-item" href="/inbox.html">💬 Replies</a>
  <a class="nav-item" href="/meetings.html">📅 Meetings</a>
 
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Lead database</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><path d="M11 11l3 3"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search by business type, product, industry, company..." autocomplete="off"/>
    </div>
  </div>

  <div class="page">
    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <div class="filter-group">
  <label>Industry Theme</label>
  <select class="filter-select" id="groupFilter" onchange="applyFilters()">
    <option value="">All Industries</option>
    <option value="Industrial & Machinery">Industrial & Machinery</option>
    <option value="Construction & Materials">Construction & Materials</option>
    <option value="Healthcare & Pharma">Healthcare & Pharma</option>
    <option value="Electronics & Tech">Electronics & Tech</option>
    <option value="Fashion & Textiles">Fashion & Textiles</option>
    <option value="Food & Agriculture">Food & Agriculture</option>
    <option value="Packaging & Containers">Packaging & Containers</option>
    <option value="Plastics & Polymers">Plastics & Polymers</option>
    <option value="Automotive & Transport">Automotive & Transport</option>
    <option value="Professional Services">Professional Services</option>
  </select>
</div>
        <label>State</label>
        <select class="filter-select" id="stateFilter" onchange="applyFilters()">
          <option value="">All states</option>
        </select>
      </div>
      <div class="filter-group">
        <label>City</label>
        <select class="filter-select" id="cityFilter" onchange="applyFilters()">
          <option value="">All cities</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select class="filter-select" id="statusFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="replied">Replied</option>
          <option value="hot">Hot</option>
          <option value="meeting">Meeting</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <button class="clear-btn" onclick="clearFilters()">Clear filters</button>

      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);">
        <div style="font-size:0.75rem;color:var(--muted);line-height:1.6;">
          <strong style="color:var(--text);display:block;margin-bottom:4px;">Search tip</strong>
          Try searching by what companies <em>sell</em>, not just their name.<br><br>
          Examples:<br>
          "automotive parts"<br>
          "software development"<br>
          "food processing"<br>
          "garment export"
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="results">
      <div class="stats-bar" id="statsBar">
        <div class="stat-pill">Loading...</div>
      </div>

      <div class="action-bar" id="actionBar" style="display:none;">
        <span class="selected-count"><strong id="selectedCount">0</strong> leads selected</span>
        <button class="action-btn" onclick="addToCampaign()">Add to campaign →</button>
        <button class="action-btn secondary" onclick="clearSelection()">Clear</button>
      </div>

      <div class="results-content" id="resultsContent">
        <div class="empty">
          <div class="spinner"></div>
          <p>Loading your lead database...</p>
        </div>
      </div>

      <div class="pagination" id="pagination" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const API   = 'http://localhost:8000/api';
const token = localStorage.getItem('sf_token');
if (!token) window.location.href = '/login.html';

let currentPage     = 1;
let currentQuery    = '';
let currentState    = '';
let currentCity     = '';
let currentStatus   = '';
let totalLeads      = 0;
let selectedLeads   = new Set();
let searchTimer     = null;
let currentGroup    = '';

// ── Init ──
async function init() {
  try { 
    await loadFilters(); 
  } catch(e) { 
    console.warn("Filters failed to load, moving to leads..."); 
  }
  await loadLeads();
}

async function apiFetch(path) {
  const r = await fetch(API + path, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (r.status === 401) { window.location.href = '/login.html'; return null; }
  return r.json();
}

// ── Load filter dropdown options (State & City) ──
async function loadFilters() {
  try {
    const data = await apiFetch('/leads/filters');
    if (!data) return;

    const stateEl = document.getElementById('stateFilter');
    if (stateEl && data.states) {
        stateEl.innerHTML = '<option value="">All states</option>';
        data.states.forEach(s => {
            var opt = document.createElement('option');
            opt.value = s.name;
            opt.textContent = `${s.name} (${s.count.toLocaleString('en-IN')})`;
            stateEl.appendChild(opt);
        });
    }

    const cityEl = document.getElementById('cityFilter');
    if (cityEl && data.cities) {
        cityEl.innerHTML = '<option value="">All cities</option>';
        data.cities.forEach(c => {
            var opt = document.createElement('option');
            opt.value = c.name;
            opt.textContent = `${c.name} (${c.count.toLocaleString('en-IN')})`;
            cityEl.appendChild(opt);
        });
    }
  } catch (e) {
    console.warn("Filters could not be loaded", e);
  }
}

// ── Load leads ──
async function loadLeads() {
  document.getElementById('resultsContent').innerHTML = 
      '<div class="empty"><div class="spinner"></div><p>Loading leads...</p></div>';

  var params = new URLSearchParams({ page: currentPage, limit: 25 });
  if (currentQuery)  params.set('q', currentQuery);
  if (currentGroup)  params.set('group', currentGroup);
  if (currentState)  params.set('state', currentState);
  if (currentCity)   params.set('city', currentCity);
  if (currentStatus) params.set('status', currentStatus);

  try {
    var controller = new AbortController();
    var timeout = setTimeout(() => controller.abort(), 15000);

    var resp = await fetch(API + '/leads/search?' + params.toString(), {
      headers: { 'Authorization': 'Bearer ' + token },
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    renderStats(data);
    renderLeads(data.leads, currentQuery);
    renderPagination(data.page, data.pages, data.total);
  } catch(e) {
    document.getElementById('resultsContent').innerHTML =
      '<div class="empty"><h3>Error loading leads</h3><p>Could not connect to the database.</p></div>';
  }
}

function renderStats(data) {
  var q = currentQuery ? ' for "' + currentQuery + '"' : '';
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-pill"><strong>' + data.total.toLocaleString('en-IN') + '</strong> leads found' + q + '</div>' +
    '<div class="stat-pill">Page <strong>' + data.page + '</strong> of <strong>' + data.pages.toLocaleString('en-IN') + '</strong></div>';
}

function renderLeads(leads, query) {
  const content = document.getElementById('resultsContent');
  if (!leads || leads.length === 0) {
    content.innerHTML = '<div class="empty"><h3>No leads found</h3><p>Try different filters.</p></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  let html = '';
  leads.forEach(lead => {
    const isSelected = selectedLeads.has(lead.id);
    let business = lead.business_details ? lead.business_details.substring(0, 150) + '...' : 'No details';
    const location = [lead.city, lead.state].filter(Boolean).join(', ') || 'Unknown';
    
    html += `
      <div class="lead-card ${isSelected ? 'selected' : ''}" onclick="toggleSelect(${lead.id}, this)">
        <div class="lead-check"><input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleSelect(${lead.id}, this.closest('.lead-card'))"/></div>
        <div class="lead-main">
          <div class="lead-company">${lead.company_name || 'Unknown'}</div>
          <div class="lead-contact">${lead.contact_name || ''}</div>
          <div class="lead-business">${business}</div>
        </div>
        <div class="lead-meta">
          <div class="lead-location">${location}</div>
          <div class="lead-email">${(lead.email || '').substring(0, 25)}</div>
          <div class="lead-mobile">${lead.mobile || lead.phone || ''}</div>
        </div>
      </div>`;
  });
  content.innerHTML = html;
}

function renderPagination(page, pages, total) {
  var el = document.getElementById('pagination');
  if (pages <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  var html = `<button class="page-btn" onclick="goPage(${page-1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>`;
  html += `<span class="page-info">Page ${page} of ${pages}</span>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page >= pages ? 'disabled' : ''}>Next →</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadLeads(); window.scrollTo(0,0); }

function toggleSelect(id, card) {
  if (selectedLeads.has(id)) {
    selectedLeads.delete(id);
    card.classList.remove('selected');
  } else {
    selectedLeads.add(id);
    card.classList.add('selected');
  }
  updateActionBar();
}

function updateActionBar() {
  var bar = document.getElementById('actionBar');
  document.getElementById('selectedCount').textContent = selectedLeads.size;
  bar.style.display = selectedLeads.size > 0 ? 'flex' : 'none';
}

function clearSelection() {
  selectedLeads.clear();
  loadLeads();
  updateActionBar();
}

function applyFilters() {
  currentGroup = document.getElementById('groupFilter').value;
  currentState = document.getElementById('stateFilter').value;
  currentCity = document.getElementById('cityFilter').value;
  currentStatus = document.getElementById('statusFilter').value;
  currentPage = 1;
  loadLeads();
}

function clearFilters() {
  document.querySelectorAll('.filter-select').forEach(s => s.value = '');
  currentGroup = currentState = currentCity = currentStatus = '';
  currentPage = 1;
  loadLeads();
}

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentQuery = document.getElementById('searchInput').value.trim();
    currentPage = 1;
    loadLeads();
  }, 400);
});

init();
</script>
</body>
</html>
