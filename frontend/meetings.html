<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meetings — SalesFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080810;--surface:#0f0f1a;--surface2:#141422;--surface3:#1a1a2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.18);
  --accent:#7c6dfa;--accent2:#e8632a;--accent-glow:rgba(124,109,250,0.15);
  --text:#e8e6f0;--muted:#6b6880;--muted2:#9896a8;--green:#3ddc97;--blue:#4fa8f5;--red:#f09595;
  --sidebar:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;padding:1.5rem 1.25rem;overflow-y:auto;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;padding:0 0.5rem;margin-bottom:1.5rem;}
.logo span{color:var(--accent);}
.nav-item{display:flex;align-items:center;gap:10px;padding:0.6rem 0.75rem;border-radius:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);text-decoration:none;margin:1px 0;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-item.active{background:rgba(124,109,250,0.1);color:var(--text);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;}
.topbar{border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;background:rgba(8,8,16,0.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40;}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-right:auto;}
.topbar-sub{font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ── PAGE ── */
.page{padding:2rem;flex:1;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.5rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:0.06;filter:blur(25px);}
.stat-glow.blue{background:var(--blue);}
.stat-glow.purple{background:var(--accent);}
.stat-glow.green{background:var(--green);}
.stat-card-accent{position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card-accent.blue{background:linear-gradient(90deg,var(--blue),transparent);}
.stat-card-accent.purple{background:linear-gradient(90deg,var(--accent),transparent);}
.stat-card-accent.green{background:linear-gradient(90deg,var(--green),transparent);}
.stat-card-label{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.7rem;}
.stat-card-value{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;letter-spacing:-0.04em;line-height:1;}
.stat-card-sub{font-size:0.77rem;color:var(--muted);margin-top:0.4rem;}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.75rem;}
.tab{padding:0.65rem 1.25rem;font-size:0.88rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;margin-bottom:-1px;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--accent);}
.tab-count{font-size:0.7rem;background:rgba(255,255,255,0.07);padding:1px 6px;border-radius:20px;font-family:'DM Mono',monospace;}
.tab.active .tab-count{background:rgba(124,109,250,0.2);color:var(--accent);}

/* ── MEETING CARDS ── */
.meeting-list{display:flex;flex-direction:column;gap:0.85rem;}
.meeting-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:1.25rem 1.5rem;display:grid;
  grid-template-columns:56px 1fr auto;
  align-items:center;gap:1.25rem;
  cursor:pointer;transition:border-color .15s,background .15s,transform .15s;
  position:relative;overflow:hidden;
}
.meeting-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);opacity:0;transition:opacity .2s;border-radius:0 2px 2px 0;
}
.meeting-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(3px);}
.meeting-card:hover::before{opacity:1;}
.meeting-card.past{opacity:0.7;}
.meeting-card.past::before{background:var(--muted);}

/* date block */
.date-block{
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:10px;padding:0.5rem;text-align:center;
  flex-shrink:0;
}
.date-day{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;line-height:1;color:var(--text);}
.date-mon{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;margin-top:2px;}
.date-time{font-size:0.68rem;color:var(--accent);font-family:'DM Mono',monospace;margin-top:4px;white-space:nowrap;}

/* card body */
.card-body{min-width:0;}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.card-title{font-weight:500;font-size:0.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-company{font-size:0.83rem;color:var(--muted2);margin-bottom:8px;}
.card-contact{font-size:0.83rem;color:var(--muted2);}
.card-contact strong{color:var(--text);font-weight:500;}
.card-pills{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.7rem;font-family:'DM Mono',monospace;}
.pill-duration{background:rgba(255,255,255,0.05);color:var(--muted2);}
.pill-email{background:rgba(124,109,250,0.08);color:var(--accent);}
.pill-source{background:rgba(61,220,151,0.07);color:var(--green);}
.pill-city{background:rgba(255,255,255,0.04);color:var(--muted);}

/* card right */
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}

/* badges */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:0.7rem;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:0.03em;}
.badge.scheduled{background:rgba(124,109,250,0.12);color:var(--accent);border:1px solid rgba(124,109,250,0.2);}
.badge.completed{background:rgba(61,220,151,0.1);color:var(--green);border:1px solid rgba(61,220,151,0.2);}
.badge.no_show{background:rgba(232,99,42,0.1);color:var(--accent2);border:1px solid rgba(232,99,42,0.2);}
.badge.cancelled{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border);}
.badge.rescheduled{background:rgba(79,168,245,0.1);color:var(--blue);border:1px solid rgba(79,168,245,0.2);}

.card-ago{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;}

/* ── EMPTY ── */
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.4;}
.empty h3{font-family:'Syne',sans-serif;font-size:1rem;color:var(--text);margin-bottom:0.5rem;}
.empty p{font-size:0.88rem;line-height:1.6;max-width:320px;margin:0 auto;}

.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─────────────────────────────────────────────
   DETAIL PANEL — full redesign
──────────────────────────────────────────── */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(3px);z-index:80;}
.panel-overlay.open{display:block;}

.detail-panel{
  position:fixed;top:0;right:-500px;width:480px;height:100vh;
  background:var(--surface);border-left:1px solid var(--border2);
  z-index:90;transition:right .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;display:flex;flex-direction:column;
}
.detail-panel.open{right:0;}

.dp-header{
  padding:1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  background:var(--surface2);
  position:sticky;top:0;z-index:10;
}
.dp-header-left{}
.dp-eyebrow{font-size:0.7rem;font-family:'DM Mono',monospace;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.dp-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;line-height:1.3;}
.dp-close{
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  color:var(--muted);font-size:1rem;cursor:pointer;
  border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;flex-shrink:0;
}
.dp-close:hover{background:rgba(255,255,255,0.1);color:var(--text);}

.dp-body{padding:1.5rem;flex:1;display:flex;flex-direction:column;gap:1.5rem;}

/* hero date display */
.dp-date-hero{
  background:linear-gradient(135deg,rgba(124,109,250,0.08),rgba(124,109,250,0.03));
  border:1px solid rgba(124,109,250,0.15);border-radius:12px;
  padding:1.25rem;display:flex;align-items:center;gap:1rem;
}
.dp-date-big{
  background:rgba(124,109,250,0.1);border:1px solid rgba(124,109,250,0.2);
  border-radius:10px;padding:0.75rem 1rem;text-align:center;min-width:62px;
}
.dp-date-num{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;line-height:1;color:var(--accent);}
.dp-date-mo{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;}
.dp-date-info{}
.dp-date-full{font-weight:500;font-size:0.92rem;color:var(--text);}
.dp-date-time-row{display:flex;align-items:center;gap:8px;margin-top:5px;}
.dp-time{font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--accent);}
.dp-dur{font-size:0.78rem;color:var(--muted);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:10px;}

/* sections */
.dp-section{}
.dp-section-title{
  font-size:0.67rem;font-family:'DM Mono',monospace;letter-spacing:0.12em;
  color:var(--muted);text-transform:uppercase;margin-bottom:0.85rem;
  display:flex;align-items:center;gap:8px;
}
.dp-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.dp-info-grid{display:flex;flex-direction:column;gap:0.6rem;}
.dp-info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.55rem 0.85rem;border-radius:8px;background:var(--surface2);
  border:1px solid var(--border);
}
.dp-info-key{font-size:0.78rem;color:var(--muted);font-family:'DM Mono',monospace;}
.dp-info-val{font-size:0.85rem;color:var(--text);font-weight:500;text-align:right;max-width:65%;word-break:break-all;}
.dp-info-val.accent{color:var(--accent);}
.dp-info-val.green{color:var(--green);}

/* notes box */
.dp-notes-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:1rem;
  font-size:0.85rem;color:var(--muted2);line-height:1.65;
  border-left:3px solid rgba(124,109,250,0.3);
}
.dp-notes-box em{font-style:italic;}

/* source chip */
.dp-source-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dp-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:20px;font-size:0.72rem;
  font-family:'DM Mono',monospace;
}
.dp-chip.bot{background:rgba(61,220,151,0.08);border:1px solid rgba(61,220,151,0.15);color:var(--green);}
.dp-chip.thread{background:rgba(124,109,250,0.08);border:1px solid rgba(124,109,250,0.15);color:var(--accent);}

/* status selector */
.dp-status-row{display:flex;align-items:center;gap:0.75rem;}
.dp-status-label{font-size:0.82rem;color:var(--muted);}
.status-select{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;padding:0.45rem 0.8rem;
  color:var(--text);font-size:0.82rem;font-family:'DM Sans',sans-serif;
  cursor:pointer;outline:none;transition:border-color .2s;flex:1;
}
.status-select:focus{border-color:var(--accent);}

.dp-footer{
  padding:1.25rem 1.5rem;border-top:1px solid var(--border);
  display:flex;gap:0.75rem;
  background:var(--surface);
  position:sticky;bottom:0;
}
.btn{padding:0.6rem 1.25rem;border-radius:8px;font-size:0.88rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;border:none;}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{box-shadow:0 4px 16px rgba(124,109,250,0.3);}
.btn-secondary{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-secondary:hover{border-color:var(--border3);color:var(--text);}

/* toast */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;
  padding:0.75rem 1.25rem;border-radius:10px;font-size:0.88rem;
  display:none;animation:fadeUp .3s ease;
}
.toast.show{display:flex;align-items:center;gap:8px;}
.toast.success{background:rgba(61,220,151,0.1);border:1px solid rgba(61,220,151,0.2);color:var(--green);}
.toast.error{background:rgba(240,149,149,0.1);border:1px solid rgba(240,149,149,0.2);color:var(--red);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .detail-panel{width:100%;right:-100%;}
  .meeting-card{grid-template-columns:48px 1fr;}
  .card-right{display:none;}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Sales<span>Flow</span></div>
  <a class="nav-item" href="/dashboard.html">⬛ Dashboard</a>
  <a class="nav-item" href="/leads.html">◉ Leads</a>
  <a class="nav-item" href="/campaigns.html">✉ Campaigns</a>
  <a class="nav-item" href="/inbox.html">💬 Replies</a>
  <a class="nav-item active" href="/meetings.html">📅 Meetings</a>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Meetings</div>
    <div class="topbar-sub">
      <div class="live-dot"></div>
      Auto-pilot arranged
    </div>
  </div>

  <div class="page">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-accent blue"></div>
        <div class="stat-glow blue"></div>
        <div class="stat-card-label">Upcoming</div>
        <div class="stat-card-value" id="sUpcoming">—</div>
        <div class="stat-card-sub">scheduled ahead</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-accent purple"></div>
        <div class="stat-glow purple"></div>
        <div class="stat-card-label">Total Booked</div>
        <div class="stat-card-value" id="sTotal">—</div>
        <div class="stat-card-sub">all time</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-accent green"></div>
        <div class="stat-glow green"></div>
        <div class="stat-card-label">Completed</div>
        <div class="stat-card-value" id="sCompleted">—</div>
        <div class="stat-card-sub">successful calls</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('upcoming',this)">
        Upcoming <span class="tab-count" id="tcUpcoming">0</span>
      </div>
      <div class="tab" onclick="switchTab('past',this)">
        Past <span class="tab-count" id="tcPast">0</span>
      </div>
      <div class="tab" onclick="switchTab('all',this)">
        All <span class="tab-count" id="tcAll">0</span>
      </div>
    </div>

    <div id="meetingList" class="meeting-list">
      <div class="empty"><div class="spinner"></div><p>Loading meetings...</p></div>
    </div>
  </div>
</div>

<!-- overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="closeDetail()"></div>

<!-- detail panel -->
<div class="detail-panel" id="detailPanel">
  <div class="dp-header">
    <div class="dp-header-left">
      <div class="dp-eyebrow">Meeting Details</div>
      <div class="dp-title" id="dpTitle">—</div>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body" id="dpBody"></div>
  <div class="dp-footer">
    <button class="btn btn-secondary" style="flex:1" onclick="closeDetail()">Close</button>
    <button class="btn btn-primary" id="dpSaveBtn" onclick="saveStatus()">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API   = 'http://localhost:8000/api';
const token = localStorage.getItem('sf_token');
if (!token) window.location.href = '/login.html';

let currentTab  = 'upcoming';
let allMeetings = [];
let activeMeeting = null;

// ── helpers ──────────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, {
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    ...opts
  });
  if (r.status === 401) { window.location.href = '/login.html'; return null; }
  return r.json();
}

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast show ${type}`;
  t.innerHTML = (type === 'success' ? '✓ ' : '✕ ') + msg;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  const s = await apiFetch('/meetings/stats');
  if (!s) return;
  document.getElementById('sUpcoming').textContent  = s.upcoming  ?? 0;
  document.getElementById('sTotal').textContent     = s.total     ?? 0;
  document.getElementById('sCompleted').textContent = s.completed ?? 0;
}

// ── tab counts ────────────────────────────────────────────────────────────────
function updateTabCounts() {
  const now = new Date();
  const upcoming = allMeetings.filter(m => m.status === 'scheduled' && new Date(m.scheduled_at) >= now);
  const past     = allMeetings.filter(m => m.status !== 'scheduled' || new Date(m.scheduled_at) < now);
  document.getElementById('tcUpcoming').textContent = upcoming.length;
  document.getElementById('tcPast').textContent     = past.length;
  document.getElementById('tcAll').textContent      = allMeetings.length;
}

// ── render ────────────────────────────────────────────────────────────────────
function renderTab(tab) {
  const listEl = document.getElementById('meetingList');
  const now    = new Date();

  let filtered = allMeetings;
  if (tab === 'upcoming')
    filtered = allMeetings.filter(m => m.status === 'scheduled' && new Date(m.scheduled_at) >= now);
  else if (tab === 'past')
    filtered = allMeetings.filter(m => m.status !== 'scheduled' || new Date(m.scheduled_at) < now);

  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📅</div>
        <h3>No meetings here</h3>
        <p>Auto-pilot hasn't confirmed any meetings in this category yet.</p>
      </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(m => {
    const snap    = m.lead_snapshot || {};
    const d       = new Date(m.scheduled_at);
    const isPast  = d < now || m.status !== 'scheduled';

    // Build a clean title: strip "Bot Arranged: " prefix, use contact name
    const companyLabel = snap.company_name && snap.company_name !== 'Prospect'
      ? snap.company_name : '';
    const contactLabel = snap.contact_name && snap.contact_name !== 'Lead'
      ? snap.contact_name : '';
    const heroTitle    = companyLabel || contactLabel || snap.email || 'Meeting';

    const location = [snap.city, snap.state].filter(Boolean).join(', ');

    return `
    <div class="meeting-card${isPast?' past':''}" onclick="openDetail('${m.id}')">
      <div class="date-block">
        <div class="date-day">${d.getDate()}</div>
        <div class="date-mon">${d.toLocaleString('en-IN',{month:'short'}).toUpperCase()}</div>
        <div class="date-time">${formatTime(m.scheduled_at)}</div>
      </div>

      <div class="card-body">
        <div class="card-head">
          <div class="card-title">${heroTitle}</div>
        </div>
        ${contactLabel && companyLabel
          ? `<div class="card-contact"><strong>${contactLabel}</strong> · ${companyLabel}</div>`
          : contactLabel
            ? `<div class="card-contact"><strong>${contactLabel}</strong></div>`
            : companyLabel
              ? `<div class="card-contact">${companyLabel}</div>`
              : ''}
        <div class="card-pills" style="margin-top:8px;">
          <span class="pill pill-duration">⏱ ${m.duration_minutes}m</span>
          ${snap.email ? `<span class="pill pill-email">✉ ${snap.email}</span>` : ''}
          ${location    ? `<span class="pill pill-city">📍 ${location}</span>` : ''}
          <span class="pill pill-source">🤖 auto-pilot</span>
        </div>
      </div>

      <div class="card-right">
        <span class="badge ${m.status}">${m.status.replace('_',' ').toUpperCase()}</span>
        <span class="card-ago">${timeAgo(m.created_at || m.scheduled_at)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── load ──────────────────────────────────────────────────────────────────────
async function loadMeetings() {
  document.getElementById('meetingList').innerHTML =
    `<div class="empty"><div class="spinner"></div><p>Syncing meetings...</p></div>`;
  const data = await apiFetch('/meetings/');
  if (data) {
    allMeetings = data;
    updateTabCounts();
    renderTab(currentTab);
  }
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTab(tab);
}

// ── detail panel ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const m = allMeetings.find(x => x.id === id);
  if (!m) return;
  activeMeeting = m;

  const snap    = m.lead_snapshot  || {};
  const d       = new Date(m.scheduled_at);
  const company = snap.company_name && snap.company_name !== 'Prospect' ? snap.company_name : '—';
  const contact = snap.contact_name && snap.contact_name !== 'Lead'     ? snap.contact_name : '—';
  const location= [snap.city, snap.state].filter(Boolean).join(', ') || '—';

  document.getElementById('dpTitle').textContent =
    (contact !== '—' ? contact : '') + (company !== '—' ? (contact !== '—' ? ' · ' : '') + company : '') || 'Meeting';

  document.getElementById('dpBody').innerHTML = `

    <!-- Date Hero -->
    <div class="dp-date-hero">
      <div class="dp-date-big">
        <div class="dp-date-num">${d.getDate()}</div>
        <div class="dp-date-mo">${d.toLocaleString('en-IN',{month:'short'}).toUpperCase()}</div>
      </div>
      <div class="dp-date-info">
        <div class="dp-date-full">${formatDate(m.scheduled_at)}</div>
        <div class="dp-date-time-row">
          <span class="dp-time">${formatTime(m.scheduled_at)}</span>
          <span class="dp-dur">⏱ ${m.duration_minutes} min</span>
        </div>
      </div>
    </div>

    <!-- Lead Info -->
    <div class="dp-section">
      <div class="dp-section-title">Lead Information</div>
      <div class="dp-info-grid">
        <div class="dp-info-row">
          <span class="dp-info-key">Contact</span>
          <span class="dp-info-val">${contact}</span>
        </div>
        <div class="dp-info-row">
          <span class="dp-info-key">Company</span>
          <span class="dp-info-val">${company}</span>
        </div>
        <div class="dp-info-row">
          <span class="dp-info-key">Email</span>
          <span class="dp-info-val accent">${snap.email || '—'}</span>
        </div>
        <div class="dp-info-row">
          <span class="dp-info-key">Location</span>
          <span class="dp-info-val">${location}</span>
        </div>
        ${snap.lead_id ? `
        <div class="dp-info-row">
          <span class="dp-info-key">Lead ID</span>
          <span class="dp-info-val" style="font-family:'DM Mono',monospace;font-size:0.78rem;">#${snap.lead_id}</span>
        </div>` : ''}
      </div>
    </div>

    <!-- Meeting Info -->
    <div class="dp-section">
      <div class="dp-section-title">Meeting Info</div>
      <div class="dp-info-grid">
        <div class="dp-info-row">
          <span class="dp-info-key">Title</span>
          <span class="dp-info-val">${m.title || '—'}</span>
        </div>
        <div class="dp-info-row">
          <span class="dp-info-key">Duration</span>
          <span class="dp-info-val">${m.duration_minutes} minutes</span>
        </div>
        <div class="dp-info-row">
          <span class="dp-info-key">Created</span>
          <span class="dp-info-val">${m.created_at ? timeAgo(m.created_at) : '—'}</span>
        </div>
        ${m.meeting_link ? `
        <div class="dp-info-row">
          <span class="dp-info-key">Link</span>
          <a href="${m.meeting_link}" target="_blank" class="dp-info-val accent" style="text-decoration:none;">Open Meeting ↗</a>
        </div>` : ''}
      </div>
    </div>

    ${m.notes ? `
    <!-- Notes -->
    <div class="dp-section">
      <div class="dp-section-title">Notes</div>
      <div class="dp-notes-box"><em>${m.notes}</em></div>
    </div>` : ''}

    <!-- Source -->
    <div class="dp-section">
      <div class="dp-section-title">Source</div>
      <div class="dp-source-row">
        <span class="dp-chip bot">🤖 Auto-pilot arranged</span>
        ${m.thread_id ? `<span class="dp-chip thread">Thread: ${m.thread_id.substring(0,12)}…</span>` : ''}
      </div>
    </div>

    <!-- Status -->
    <div class="dp-section">
      <div class="dp-section-title">Update Status</div>
      <div class="dp-status-row">
        <span class="dp-status-label">Status</span>
        <select class="status-select" id="dpStatus">
          <option value="scheduled"   ${m.status==='scheduled'  ?'selected':''}>Scheduled</option>
          <option value="completed"   ${m.status==='completed'  ?'selected':''}>Completed</option>
          <option value="no_show"     ${m.status==='no_show'    ?'selected':''}>No Show</option>
          <option value="cancelled"   ${m.status==='cancelled'  ?'selected':''}>Cancelled</option>
          <option value="rescheduled" ${m.status==='rescheduled'?'selected':''}>Rescheduled</option>
        </select>
      </div>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
  activeMeeting = null;
}

async function saveStatus() {
  if (!activeMeeting) return;
  const status = document.getElementById('dpStatus').value;
  const btn    = document.getElementById('dpSaveBtn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    await apiFetch(`/meetings/${activeMeeting.id}`, {
      method:  'PATCH',
      body:    JSON.stringify({ status }),
    });
    // update local state
    const idx = allMeetings.findIndex(m => m.id === activeMeeting.id);
    if (idx !== -1) allMeetings[idx].status = status;
    activeMeeting.status = status;
    updateTabCounts();
    renderTab(currentTab);
    showToast('Status updated');
    closeDetail();
  } catch(e) {
    showToast('Failed to update status', 'error');
  } finally {
    btn.textContent = 'Save Changes';
    btn.disabled = false;
  }
}

// ── init ──────────────────────────────────────────────────────────────────────
loadStats();
loadMeetings();
</script>
</body>
</html>
